<!doctype html>

<html class="dark" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "secondary-container": "#1c5329",
              surface: "#131313",
              background: "#131313",
              "tertiary-container": "#ff767b",
              "on-secondary-fixed-variant": "#195127",
              "on-error": "#690005",
              "on-surface": "#e5e2e1",
              "on-primary": "#003914",
              "outline-variant": "#3d4a3d",
              "on-tertiary-fixed": "#400009",
              "inverse-primary": "#006e2d",
              "surface-variant": "#353534",
              "primary-fixed-dim": "#53e076",
              "on-background": "#e5e2e1",
              "primary-container": "#1db954",
              "on-primary-fixed-variant": "#005320",
              primary: "#53e076",
              "on-secondary": "#003914",
              "surface-dim": "#131313",
              "error-container": "#93000a",
              "surface-tint": "#53e076",
              outline: "#869585",
              "surface-container-highest": "#353534",
              "tertiary-fixed-dim": "#ffb3b3",
              "on-error-container": "#ffdad6",
              "surface-container-low": "#1c1b1b",
              "secondary-fixed": "#b5f1b8",
              "primary-fixed": "#72fe8f",
              "secondary-fixed-dim": "#99d59d",
              secondary: "#99d59d",
              "on-tertiary-fixed-variant": "#881d28",
              "inverse-surface": "#e5e2e1",
              "surface-container-lowest": "#0e0e0e",
              "inverse-on-surface": "#313030",
              "on-primary-fixed": "#002108",
              "tertiary-fixed": "#ffdad9",
              "on-secondary-container": "#8cc690",
              "surface-container": "#201f1f",
              "surface-bright": "#393939",
              "on-secondary-fixed": "#002108",
              "surface-container-high": "#2a2a2a",
              "on-surface-variant": "#bccbb9",
              "on-tertiary": "#680114",
              "on-primary-container": "#004118",
              tertiary: "#ffb3b3",
              "on-tertiary-container": "#730a1b",
              error: "#ffb4ab",
            },
            fontFamily: {
              headline: ["Plus Jakarta Sans"],
              body: ["Inter"],
              label: ["Inter"],
            },
            borderRadius: {
              DEFAULT: "0.25rem",
              lg: "0.5rem",
              xl: "0.75rem",
              full: "9999px",
            },
          },
        },
      };
    </script>
    <style>
      .material-symbols-outlined {
        font-variation-settings:
          "FILL" 0,
          "wght" 400,
          "GRAD" 0,
          "opsz" 24;
      }
      .fill-icon {
        font-variation-settings: "FILL" 1;
      }
      .bg-gradient-dynamic {
        background: linear-gradient(180deg, #1db954 0%, #131313 100%);
      }
    </style>
    <style>
      body {
        min-height: max(884px, 100dvh);
      }
    </style>
  </head>
  <body
    class="bg-surface text-on-surface font-body selection:bg-primary selection:text-on-primary min-h-screen overflow-hidden"
  >
    <!-- Background Layer (Vibrant gradient based on album art) -->
    <div class="fixed inset-0 bg-gradient-dynamic opacity-30 z-0"></div>
    <div class="fixed inset-0 bg-surface/40 backdrop-blur-3xl z-0"></div>
    <!-- Main Content Canvas -->
    <main
      class="relative z-10 flex flex-col h-screen max-w-lg mx-auto px-6 pt-4 pb-8 md:max-w-4xl md:px-12 md:flex-row md:items-center md:gap-16"
    >
      <!-- Header / Navigation -->
      <header class="w-full flex justify-between items-center mb-8 md:hidden">
        <button class="p-2 transition-transform active:scale-90">
          <span class="material-symbols-outlined text-on-surface"
            >expand_more</span
          >
        </button>
        <div class="text-center">
          <p
            class="font-label text-xs uppercase tracking-widest text-on-surface-variant"
          >
            Playing from playlist
          </p>
          <h1 class="font-headline text-sm font-bold">Techno Bunker</h1>
        </div>
        <button class="p-2 transition-transform active:scale-90">
          <span class="material-symbols-outlined text-on-surface"
            >more_vert</span
          >
        </button>
      </header>
      <!-- Left Column: Album Art -->
      <section class="flex-1 flex items-center justify-center mb-10 md:mb-0">
        <div class="relative w-full aspect-square max-w-[400px] group">
          <img
            alt="Album Art"
            class="w-full h-full object-cover rounded-xl shadow-[0_20px_50px_rgba(0,0,0,0.5)] transition-transform duration-500 group-hover:scale-[1.02]"
            data-alt="Stunning close-up of a holographic vinyl record spinning under neon green lighting with deep shadows and sharp reflections"
            src="https://lh3.googleusercontent.com/aida-public/AB6AXuCMWZTBtENLMR4CV4h-zjBln1Khdw0CrpJerXhPAmv6MK2M1oHM-W5Kf6QQzJE_PTJPF5hI7-E6w78iWgEJ6S1-vl17u9fRcING_YGMZEmk8noJkmyLoOM1mbPeLE0BZxNvd0A-kMzGXlKxMmYY8sNAJshK_nGWtWYDorf1STFbmcZdXsSb3sm0wg1PVkcMdoG8KE3tralMTrLe1HxdEz611X3BTro8bGAPDi4_rm4DQIicdTlLkFHj_ICuvo7b-X6vW4wR7WnO6xQ"
          />
          <div
            class="absolute inset-0 rounded-xl ring-1 ring-white/10 pointer-events-none"
          ></div>
        </div>
      </section>
      <!-- Right Column: Controls & Metadata -->
      <section class="flex-1 flex flex-col justify-center w-full">
        <!-- Metadata & Action -->
        <div class="flex justify-between items-end mb-8">
          <div class="space-y-1">
            <h2
              class="font-headline text-2xl md:text-4xl font-extrabold tracking-tight"
            >
              Neon Pulse
            </h2>
            <p class="font-body text-lg text-on-surface-variant font-medium">
              Synthetic Dreams
            </p>
          </div>
          <button class="p-3 transition-colors hover:text-primary">
            <span
              class="material-symbols-outlined text-3xl fill-icon text-primary"
              style="font-variation-settings: &quot;FILL&quot; 1"
              >favorite</span
            >
          </button>
        </div>
        <!-- Progress Bar Section -->
        <div class="w-full space-y-2 mb-8">
          <div
            class="relative w-full h-1 bg-surface-container-highest rounded-full group cursor-pointer"
          >
            <!-- Progress Fill -->
            <div
              class="absolute top-0 left-0 h-full w-2/5 bg-primary rounded-full relative"
            >
              <!-- Playhead handle -->
              <div
                class="absolute -right-1.5 -top-1.5 w-4 h-4 bg-on-surface rounded-full shadow-lg opacity-0 group-hover:opacity-100 transition-opacity"
              ></div>
            </div>
          </div>
          <div
            class="flex justify-between font-label text-[10px] text-on-surface-variant font-semibold"
          >
            <span>1:42</span>
            <span>4:15</span>
          </div>
        </div>
        <!-- Playback Controls -->
        <div class="flex items-center justify-between mb-10">
          <button
            class="text-on-surface-variant hover:text-primary transition-colors"
          >
            <span class="material-symbols-outlined text-2xl">shuffle</span>
          </button>
          <div class="flex items-center gap-6 md:gap-10">
            <button
              class="text-on-surface hover:text-primary transition-colors active:scale-90"
            >
              <span
                class="material-symbols-outlined text-4xl fill-icon"
                style="font-variation-settings: &quot;FILL&quot; 1"
                >skip_previous</span
              >
            </button>
            <button
              class="w-16 h-16 md:w-20 md:h-20 bg-primary text-on-primary rounded-full flex items-center justify-center shadow-xl shadow-primary/20 transition-all hover:scale-105 active:scale-95 bg-gradient-to-br from-primary to-primary-container"
            >
              <span
                class="material-symbols-outlined text-4xl md:text-5xl fill-icon"
                style="font-variation-settings: &quot;FILL&quot; 1"
                >pause</span
              >
            </button>
            <button
              class="text-on-surface hover:text-primary transition-colors active:scale-90"
            >
              <span
                class="material-symbols-outlined text-4xl fill-icon"
                style="font-variation-settings: &quot;FILL&quot; 1"
                >skip_next</span
              >
            </button>
          </div>
          <button class="text-primary transition-colors">
            <span class="material-symbols-outlined text-2xl">repeat</span>
          </button>
        </div>
        <!-- Footer Tools -->
        <div class="flex justify-between items-center text-on-surface-variant">
          <button
            class="hover:text-on-surface transition-colors flex items-center gap-2"
          >
            <span class="material-symbols-outlined text-xl">devices</span>
            <span
              class="text-[10px] font-bold uppercase tracking-wider hidden md:inline"
              >Studio Pro Wireless</span
            >
          </button>
          <div class="flex gap-6">
            <button class="hover:text-on-surface transition-colors">
              <span class="material-symbols-outlined text-xl">share</span>
            </button>
            <button class="hover:text-on-surface transition-colors">
              <span class="material-symbols-outlined text-xl"
                >playlist_play</span
              >
            </button>
          </div>
        </div>
      </section>
    </main>
    <!-- Bottom Navigation Layer (Tonal layering per Design System) -->
    <nav class="fixed bottom-0 left-0 w-full md:hidden z-20">
      <div
        class="bg-surface-container/70 backdrop-blur-xl pt-2 pb-6 px-4 flex justify-around items-center rounded-t-xl"
      >
        <div
          class="flex flex-col items-center justify-center text-on-surface-variant opacity-70"
        >
          <span class="material-symbols-outlined">home</span>
          <span class="font-label text-[10px] mt-1">Home</span>
        </div>
        <div
          class="flex flex-col items-center justify-center text-on-surface-variant opacity-70"
        >
          <span class="material-symbols-outlined">search</span>
          <span class="font-label text-[10px] mt-1">Search</span>
        </div>
        <div
          class="flex flex-col items-center justify-center text-white scale-105"
        >
          <span
            class="material-symbols-outlined fill-icon"
            style="font-variation-settings: &quot;FILL&quot; 1"
            >library_music</span
          >
          <span class="font-label text-[10px] mt-1">Your Library</span>
        </div>
        <div
          class="flex flex-col items-center justify-center text-on-surface-variant opacity-70"
        >
          <span class="material-symbols-outlined">workspace_premium</span>
          <span class="font-label text-[10px] mt-1">Premium</span>
        </div>
      </div>
    </nav>
  </body>
</html>
