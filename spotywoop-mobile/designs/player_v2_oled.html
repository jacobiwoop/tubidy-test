<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotywoop - Variant 2: OLED Monochrome</title>
    <style>
        :root {
            --bg-color: #000000;
            --accent: #ffffff;
            --text-main: #ffffff;
            --text-dim: #666666;
            --border: #1a1a1a;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            overflow: hidden;
        }

        .container {
            display: flex;
            flex-direction: column;
            height: 100%;
            padding: 24px;
            box-sizing: border-box;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .album-art-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 50px;
        }

        .album-art {
            width: 80vw;
            height: 80vw;
            max-width: 320px;
            max-height: 320px;
            background: url('https://i.scdn.co/image/ab67616d0000b2737070dba47ed230009581c8c5') no-repeat center center;
            background-size: cover;
            border: 1px solid var(--border);
        }

        .track-info {
            text-align: center;
            margin-bottom: 40px;
        }

        .title {
            font-size: 28px;
            font-weight: 300;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .artist {
            font-size: 14px;
            color: var(--text-dim);
            margin: 10px 0 0 0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .slider-container {
            margin-bottom: 40px;
        }

        .slider-track {
            height: 1px;
            background: var(--border);
            position: relative;
        }

        .slider-progress {
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 60%;
            background: var(--accent);
        }

        .time {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
            font-size: 10px;
            color: var(--text-dim);
            font-family: monospace;
        }

        .controls {
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin-bottom: 50px;
        }

        .btn {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            padding: 15px;
        }

        .btn-play {
            border: 1px solid white;
            border-radius: 50%;
            width: 64px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .footer-actions {
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            padding-top: 20px;
        }

        .btn-mini { color: var(--text-dim); font-size: 10px; text-transform: uppercase; }

    </style>
</head>
<body>
    <div class="container">
        <header>
            <div style="font-size: 12px; letter-spacing: 1px;">001 / PLAYING</div>
            <div style="width: 20px; height: 1px; background: white;"></div>
        </header>

        <div class="album-art-container">
            <div class="album-art"></div>
        </div>

        <div class="track-info">
            <h1 class="title">Starboy</h1>
            <p class="artist">The Weeknd</p>
        </div>

        <div class="slider-container">
            <div class="slider-track">
                <div class="slider-progress"></div>
            </div>
            <div class="time">
                <span>02:14</span>
                <span>03:50</span>
            </div>
        </div>

        <div class="controls">
            <button class="btn"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><path d="M11 17l-5-5 5-5M18 17l-5-5 5-5"/></svg></button>
            <button class="btn btn-play"><svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg></button>
            <button class="btn"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><path d="M13 17l5-5-5-5M6 17l5-5-5-5"/></svg></button>
        </div>

        <div class="footer-actions">
            <div class="btn-mini">Favorite: No</div>
            <div class="btn-mini">Quality: High</div>
            <div class="btn-mini">Source: Deezer</div>
        </div>
    </div>
</body>
</html>
