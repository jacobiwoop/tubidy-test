<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotywoop - Variant 3: Art-Focused</title>
    <style>
        :root {
            --bg-color: #707070;
            --text-main: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.7);
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            overflow: hidden;
        }

        .container {
            display: flex;
            flex-direction: column;
            height: 100%;
            position: relative;
        }

        .full-art-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://i.scdn.co/image/ab67616d0000b2737070dba47ed230009581c8c5') no-repeat center center;
            background-size: cover;
            z-index: 0;
        }

        .gradient-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(0deg, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.4) 50%, rgba(0,0,0,0.8) 100%);
            z-index: 1;
        }

        .content {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            height: 100%;
            padding: 30px;
            box-sizing: border-box;
            justify-content: flex-end;
        }

        .floating-art {
            position: absolute;
            top: 15%;
            left: 50%;
            transform: translateX(-50%);
            width: 70vw;
            height: 70vw;
            border-radius: 50%;
            background: url('https://i.scdn.co/image/ab67616d0000b2737070dba47ed230009581c8c5') no-repeat center center;
            background-size: cover;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            animation: rotate 20s linear infinite;
        }

        @keyframes rotate {
            from { transform: translateX(-50%) rotate(0deg); }
            to { transform: translateX(-50%) rotate(360deg); }
        }

        .track-header {
            margin-bottom: 40px;
        }

        .title {
            font-size: 32px;
            font-weight: 900;
            margin: 0;
        }

        .artist {
            font-size: 20px;
            color: var(--text-dim);
            margin: 10px 0 0 0;
        }

        .slider-bar {
            height: 6px;
            background: rgba(255,255,255,0.2);
            border-radius: 3px;
            margin-bottom: 30px;
            overflow: hidden;
        }

        .slider-fill {
            width: 80%;
            height: 100%;
            background: #fff;
        }

        .controls-row {
            display: flex;
            justify-content: center;
            gap: 40px;
            align-items: center;
            margin-bottom: 20px;
        }

        .circle-btn {
            width: 60px;
            height: 60px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
        }

        .play-big {
            width: 90px;
            height: 90px;
            background: #fff;
            color: #000;
        }

    </style>
</head>
<body>
    <div class="container">
        <div class="full-art-bg"></div>
        <div class="gradient-overlay"></div>
        
        <div class="floating-art"></div>

        <div class="content">
            <div class="track-header">
                <h1 class="title">Starboy</h1>
                <p class="artist">The Weeknd</p>
            </div>

            <div class="slider-bar">
                <div class="slider-fill"></div>
            </div>

            <div class="controls-row">
                <div class="circle-btn"><svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M11 19l-9-7 9-7v14zm10-14l-9 7 9 7V5z"/></svg></div>
                <div class="circle-btn play-big"><svg width="40" height="40" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg></div>
                <div class="circle-btn"><svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M13 19l9-7-9-7v14zM3 5v14l9-7-9-7z"/></svg></div>
            </div>
        </div>
    </div>
</body>
</html>
