name: App Debug Build (Dev Client)

on:
  workflow_dispatch: # Permet de lancer le build manuellement depuis l'onglet Actions
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: mobile/package.json

      - name: ☕ Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 📦 Install dependencies
        working-directory: mobile
        run: npm install --legacy-peer-deps

      - name: 🛠 Prebuild Expo (Dev Client Mode)
        working-directory: mobile
        run: |
          npx expo prebuild --platform android --no-install
          # Patch Proguard pour éviter les erreurs R8 sur les modules Expo
          mkdir -p android/app
          echo "-dontwarn expo.modules.**" >> android/app/proguard-rules.pro
          echo "-dontwarn com.facebook.react.**" >> android/app/proguard-rules.pro

      - name: 🏗 Build Debug APK
        working-directory: mobile
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: 📤 Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: Spotywoop-Debug-Client
          path: mobile/android/app/build/outputs/apk/debug/*.apk
