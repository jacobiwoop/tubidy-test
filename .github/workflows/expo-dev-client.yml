name: Build ExpoWoop Dev Client (APK)

on:
  workflow_dispatch: # Permet de lancer le build manuellement
  push:
    paths:
      - 'expo-dev-client/**'
      - '.github/workflows/expo-dev-client.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: expo-dev-client

    steps:
      - name: 🏗 Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: ☕ Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 📦 Install dependencies
        run: npm install

      - name: 🛠 Prebuild Android
        run: npx expo prebuild --platform android --clean

      - name: 🔧 Fix Gradle Compatibility
        run: |
          # Correction de l'erreur "unknown property release" fréquente sur SDK 50 + Gradle 8
          # On cherche dans tous les fichiers .gradle, pas seulement build.gradle
          find . -name "*.gradle" -exec sed -i 's/components.release/components.findByName("release")/g' {} +
          # S'assurer que le wrapper est exécutable
          chmod +x android/gradlew

      - name: 🏗 Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: 📤 Upload Dev Client APK
        uses: actions/upload-artifact@v4
        with:
          name: expowoop-dev-client-debug
          path: expo-dev-client/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
