name: Build Spotywoop Production (Release)

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - 'spotywoop-mobile/**'
      - '.github/workflows/spotywoop-mobile.yml'

jobs:
  build-production:
    name: 🚀 Build Production Release
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: spotywoop-mobile

    steps:
      - name: 🏗 Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: ☕ Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 📦 Install dependencies
        run: npm install --legacy-peer-deps

      - name: 🛠 Prebuild Android
        run: |
          npx expo prebuild --platform android --clean
          # --- SUPER FIX KOTLIN ---
          # 1. Injection du classpath Kotlin dans le buildscript racine
          sed -i 's/dependencies {/dependencies {\n        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:1.9.0")/' android/build.gradle
          # 2. Forcer la variable kotlinVersion (utilisée par les plugins Expo)
          sed -i 's/kotlinVersion = .*/kotlinVersion = "1.9.0"/' android/build.gradle
          # 3. Patch Proguard pour éviter les erreurs de type R8 en Release
          echo "-dontwarn expo.modules.**" >> android/app/proguard-rules.pro
          echo "Super Fix Applied"

      - name: 🔧 Fix Gradle Compatibility
        run: |
          chmod +x android/gradlew

      - name: 🏗 Build Release APK
        run: |
          cd android
          ./gradlew assembleRelease

      - name: ✍️ Sign and Align APK (Manual)
        id: sign_app
        run: |
          # 1. Localiser les outils Android
          ZIPALIGN=$(find $ANDROID_HOME/build-tools -name zipalign | sort -r | head -n 1)
          APKSIGNER=$(find $ANDROID_HOME/build-tools -name apksigner | sort -r | head -n 1)
          echo "Using zipalign: $ZIPALIGN"
          echo "Using apksigner: $APKSIGNER"
          
          # 2. Préparer les fichiers
          cd android/app/build/outputs/apk/release
          APK_FILE=$(find . -name "*.apk" -maxdepth 1 | head -n 1)
          echo "Found APK to sign: $APK_FILE"
          
          # 3. Aligner l'APK (on crée un fichier temporaire)
          $ZIPALIGN -v 4 "$APK_FILE" app-release-aligned.apk
          
          # 4. Décoder la clé de signature
          echo "${{ secrets.ANDROID_SIGNING_KEY }}" | base64 -d > release.jks
          
          # 5. Signer l'APK
          $APKSIGNER sign --ks release.jks \
            --ks-key-alias "${{ secrets.ANDROID_ALIAS }}" \
            --ks-pass pass:"${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            --key-pass pass:"${{ secrets.ANDROID_KEY_PASSWORD }}" \
            --out spotywoop-release-signed.apk \
            app-release-aligned.apk
            
          echo "signed_file=spotywoop-mobile/android/app/build/outputs/apk/release/spotywoop-release-signed.apk" >> $GITHUB_OUTPUT

      - name: 📤 Upload Production APK
        uses: actions/upload-artifact@v4
        with:
          name: spotywoop-production-release
          path: spotywoop-mobile/android/app/build/outputs/apk/release/spotywoop-release-signed.apk
          retention-days: 30
