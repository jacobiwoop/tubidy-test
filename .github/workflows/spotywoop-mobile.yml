name: Build Spotywoop Production (Release)

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - 'spotywoop-mobile/**'
      - '.github/workflows/spotywoop-mobile.yml'

jobs:
  build-production:
    name: 🚀 Build Production Release
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: spotywoop-mobile

    steps:
      - name: 🏗 Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: ☕ Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 📦 Install dependencies
        run: npm install --legacy-peer-deps

      - name: 🛠 Prebuild Android
        run: |
          npx expo prebuild --platform android --clean
          # --- SUPER FIX KOTLIN ---
          # 1. Injection du classpath Kotlin dans le buildscript racine
          sed -i 's/dependencies {/dependencies {\n        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:1.9.0")/' android/build.gradle
          # 2. Forcer la variable kotlinVersion (utilisée par les plugins Expo)
          sed -i 's/kotlinVersion = .*/kotlinVersion = "1.9.0"/' android/build.gradle
          # 3. Patch Proguard pour éviter les erreurs de type R8 en Release
          echo "-dontwarn expo.modules.**" >> android/app/proguard-rules.pro
          echo "Super Fix Applied"

      - name: 🔧 Fix Gradle Compatibility
        run: |
          chmod +x android/gradlew

      - name: 🏗 Build Release APK
        run: |
          cd android
          ./gradlew assembleRelease

      - name: ✍️ Sign Android Release
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: spotywoop-mobile/android/app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.ANDROID_SIGNING_KEY }}
          alias: ${{ secrets.ANDROID_ALIAS }}
          keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}
          buildToolsVersion: "34.0.0"

      - name: 📤 Upload Production APK
        uses: actions/upload-artifact@v4
        with:
          name: spotywoop-production-release
          path: ${{ steps.sign_app.outputs.signedReleaseFile }}
          retention-days: 30
