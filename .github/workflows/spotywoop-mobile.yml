name: Build & Release Spotywoop

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - 'spotywoop-mobile/**'
      - '.github/workflows/spotywoop-mobile.yml'

jobs:
  # --- JOB 1: BUILD DEV CLIENT ---
  build-dev-client:
    name: 🧪 Build Expo Dev Client
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: spotywoop-mobile

    steps:
      - name: 🏗 Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: ☕ Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 📦 Install dependencies
        run: npm install --legacy-peer-deps

      - name: 🪄 Customize for Dev Client
        run: |
          # Modification du nom et retrait du logo pour le Dev Client
          jq '.expo.name = "Expo Dev Client" | del(.expo.icon) | del(.expo.android.adaptiveIcon)' app.json > app.json.tmp && mv app.json.tmp app.json
          echo "App.json patched for Dev Client"

      - name: 🛠 Prebuild Android
        run: npx expo prebuild --platform android --clean

      - name: 🔧 Fix Gradle Compatibility
        run: |
          find . -type f -name "*.gradle" -exec sed -i 's/components.release/components.findByName("release")/g' {} +
          chmod +x android/gradlew

      - name: 🏗 Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: 📤 Upload Dev Client APK
        uses: actions/upload-artifact@v4
        with:
          name: spotywoop-dev-client
          path: spotywoop-mobile/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

  # --- JOB 2: BUILD PRODUCTION RELEASE ---
  build-production:
    name: 🚀 Build Production Release
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: spotywoop-mobile

    steps:
      - name: 🏗 Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: ☕ Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 📦 Install dependencies
        run: npm install --legacy-peer-deps

      - name: 🛠 Prebuild Android
        run: npx expo prebuild --platform android --clean

      - name: 🔧 Fix Gradle Compatibility
        run: |
          find . -type f -name "*.gradle" -exec sed -i 's/components.release/components.findByName("release")/g' {} +
          chmod +x android/gradlew

      - name: 🏗 Build Release APK
        run: |
          cd android
          ./gradlew assembleRelease

      - name: ✍️ Sign Android Release
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: spotywoop-mobile/android/app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.ANDROID_SIGNING_KEY }}
          alias: ${{ secrets.ANDROID_ALIAS }}
          keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: 📤 Upload Production APK
        uses: actions/upload-artifact@v4
        with:
          name: spotywoop-production-release
          path: ${{ steps.sign_app.outputs.signedReleaseFile }}
          retention-days: 30
