name: Build Tubidy APK (Fast Local)

on:
  push:
    branches:
      - main

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: ☕ Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 📦 Install dependencies
        run: |
          cd mobile
          npm install

      - name: 🛠 Prebuild Expo (generate native files)
        run: |
          cd mobile
          npx expo prebuild --platform android
          # Forcer la version de Kotlin dans le fichier généré
          sed -i 's/kotlinVersion = .*/kotlinVersion = "2.0.21"/' android/build.gradle

      - name: 🏗 Build Android APK (Release)
        run: |
          cd mobile/android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: 📤 Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tubidy-app-release
          path: mobile/android/app/build/outputs/apk/release/*.apk
