name: Android Development Build
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: mobile/package.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        working-directory: mobile
        run: npm install

      - name: Prebuild Expo (Development Mode)
        working-directory: mobile
        run: |
          npx expo prebuild --platform android --no-install
          echo "-dontwarn expo.modules.**" >> android/app/proguard-rules.pro

      - name: Build Debug APK (Development Client)
        working-directory: mobile
        run: cd android && ./gradlew assembleDebug

      - name: Upload Development APK
        uses: actions/upload-artifact@v4
        with:
          name: spotywoop-dev-client
          path: mobile/android/app/build/outputs/apk/debug/*.apk
