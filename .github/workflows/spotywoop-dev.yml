name: Build Spotywoop Dev (Debug)

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - 'spotywoop-mobile/**'
      - '.github/workflows/spotywoop-dev.yml'

jobs:
  build-dev-client:
    name: 🧪 Build Expo Dev Client
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: spotywoop-mobile

    steps:
      - name: 🏗 Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: ☕ Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 📦 Install dependencies
        run: npm install --legacy-peer-deps

      - name: 🪄 Customize for Dev Client
        run: |
          # Modification du nom et retrait du logo pour le Dev Client
          jq '.expo.name = "Expo Dev Client" | del(.expo.icon) | del(.expo.android.adaptiveIcon)' app.json > app.json.tmp && mv app.json.tmp app.json
          echo "App.json patched for Dev Client"

      - name: 🛠 Prebuild Android
        run: npx expo prebuild --platform android --clean

      - name: 🔧 Fix Gradle Compatibility
        run: |
          chmod +x android/gradlew

      - name: 🏗 Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: 📤 Upload Dev Client APK
        uses: actions/upload-artifact@v4
        with:
          name: spotywoop-dev-client
          path: spotywoop-mobile/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
