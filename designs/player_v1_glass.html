<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotywoop - Variant 1: Glassmorphism</title>
    <style>
        :root {
            --bg-color: #090909;
            --accent: #1DB954;
            --text-main: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.6);
            --glass: rgba(255, 255, 255, 0.08);
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            overflow: hidden;
        }

        .container {
            display: flex;
            flex-direction: column;
            height: 100%;
            padding: 20px;
            box-sizing: border-box;
            background: linear-gradient(180deg, #1a2a3a 0%, #090909 100%);
            position: relative;
        }

        .background-aura {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: url('https://i.scdn.co/image/ab67616d0000b2737070dba47ed230009581c8c5') no-repeat center center;
            background-size: cover;
            filter: blur(80px) brightness(0.4);
            z-index: 0;
            opacity: 0.6;
        }

        .content {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .chevron { width: 24px; height: 24px; border-left: 2px solid white; border-bottom: 2px solid white; transform: rotate(-45deg); margin-top: -5px; }

        .album-art-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 40px;
        }

        .album-art {
            width: 85vw;
            height: 85vw;
            max-width: 350px;
            max-height: 350px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            background: url('https://i.scdn.co/image/ab67616d0000b2737070dba47ed230009581c8c5') no-repeat center center;
            background-size: cover;
        }

        .track-info {
            margin-bottom: 30px;
        }

        .title {
            font-size: 24px;
            font-weight: 800;
            margin: 0;
            letter-spacing: -0.5px;
        }

        .artist {
            font-size: 18px;
            color: var(--text-dim);
            margin: 5px 0 0 0;
        }

        .slider-container {
            margin-bottom: 30px;
        }

        .slider-track {
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            position: relative;
        }

        .slider-progress {
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 35%;
            background: var(--text-main);
            border-radius: 2px;
        }

        .slider-thumb {
            position: absolute;
            left: 35%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 12px;
            height: 12px;
            background: var(--text-main);
            border-radius: 50%;
        }

        .time {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
            font-size: 12px;
            color: var(--text-dim);
        }

        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .btn {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            padding: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-play {
            width: 70px;
            height: 70px;
            background: white;
            border-radius: 50%;
            color: black;
        }

        .footer-actions {
            display: flex;
            justify-content: space-around;
            padding-bottom: 20px;
        }

        .btn-small { color: var(--text-dim); }

    </style>
</head>
<body>
    <div class="container">
        <div class="background-aura"></div>
        <div class="content">
            <header>
                <div class="chevron"></div>
                <div style="font-weight: 600; font-size: 14px;">LECTURE EN COURS</div>
                <div style="font-size: 24px; transform: rotate(90deg);">...</div>
            </header>

            <div class="album-art-container">
                <div class="album-art"></div>
            </div>

            <div class="track-info">
                <h1 class="title">Starboy</h1>
                <p class="artist">The Weeknd, Daft Punk</p>
            </div>

            <div class="slider-container">
                <div class="slider-track">
                    <div class="slider-progress"></div>
                    <div class="slider-thumb"></div>
                </div>
                <div class="time">
                    <span>1:24</span>
                    <span>3:50</span>
                </div>
            </div>

            <div class="controls">
                <button class="btn"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h11l5-5V5a2 2 0 0 0-2-2z"/><polyline points="15 3 15 8 20 8"/></svg></button>
                <button class="btn"><svg width="32" height="32" viewBox="0 0 24 24" fill="currentColor"><path d="M11 19l-9-7 9-7v14zm10-14l-9 7 9 7V5z"/></svg></button>
                <button class="btn btn-play"><svg width="32" height="32" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg></button>
                <button class="btn"><svg width="32" height="32" viewBox="0 0 24 24" fill="currentColor"><path d="M13 19l9-7-9-7v14zM3 5v14l9-7-9-7z"/></svg></button>
                <button class="btn"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg></button>
            </div>

            <div class="footer-actions">
                <button class="btn btn-small"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg></button>
                <button class="btn btn-small"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 11 3 22 21 22 21 11"/><path d="M21 11l-9-8-9 8"/><rect x="9" y="14" width="6" height="8"/></svg></button>
                <button class="btn btn-small"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg></button>
            </div>
        </div>
    </div>
</body>
</html>
