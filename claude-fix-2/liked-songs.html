<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0"
    />
    <title>Liked Songs — Spotywoop</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #080808;
        --surface: #111111;
        --surface2: #1a1a1a;
        --accent: #1db954;
        --accent-dim: rgba(29, 185, 84, 0.12);
        --accent-glow: rgba(29, 185, 84, 0.25);
        --text: #ffffff;
        --muted: #a7a7a7;
        --muted2: #555;
        --border: rgba(255, 255, 255, 0.06);
        --liked-from: #4a0080;
        --liked-to: #1a3a6b;
        --liked-mid: #0d2b4e;
        --radius: 12px;
        --transition: 0.18s cubic-bezier(0.4, 0, 0.2, 1);
      }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: "DM Sans", sans-serif;
        min-height: 100vh;
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased;
      }

      /* ── Header hero ── */
      .hero {
        position: relative;
        padding: 0 0 32px;
        overflow: hidden;
        min-height: 340px;
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
      }

      .hero-bg {
        position: absolute;
        inset: 0;
        background: linear-gradient(
          135deg,
          #4a0080 0%,
          #1a3a6b 45%,
          #080808 100%
        );
        z-index: 0;
      }

      .hero-bg::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(to bottom, transparent 40%, var(--bg) 100%);
      }

      /* Motif géométrique en fond */
      .hero-pattern {
        position: absolute;
        inset: 0;
        z-index: 1;
        opacity: 0.07;
        background-image:
          repeating-linear-gradient(
            45deg,
            #fff 0,
            #fff 1px,
            transparent 0,
            transparent 50%
          ),
          repeating-linear-gradient(
            -45deg,
            #fff 0,
            #fff 1px,
            transparent 0,
            transparent 50%
          );
        background-size: 28px 28px;
      }

      .hero-content {
        position: relative;
        z-index: 2;
        padding: 60px 20px 0;
      }

      .back-btn {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        background: none;
        border: none;
        color: rgba(255, 255, 255, 0.7);
        font-family: "DM Sans", sans-serif;
        font-size: 14px;
        cursor: pointer;
        padding: 8px 0;
        margin-bottom: 24px;
        transition: color var(--transition);
      }
      .back-btn:hover {
        color: #fff;
      }
      .back-btn svg {
        width: 18px;
        height: 18px;
      }

      .hero-icon {
        width: 140px;
        height: 140px;
        border-radius: 16px;
        background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 20px;
        box-shadow:
          0 20px 60px rgba(106, 17, 203, 0.4),
          0 0 0 1px rgba(255, 255, 255, 0.08);
        position: relative;
        overflow: hidden;
      }

      .hero-icon::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          135deg,
          rgba(255, 255, 255, 0.15) 0%,
          transparent 60%
        );
      }

      .hero-icon svg {
        width: 64px;
        height: 64px;
        color: #fff;
        position: relative;
        z-index: 1;
        filter: drop-shadow(0 4px 12px rgba(0, 0, 0, 0.3));
      }

      .hero-label {
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.5);
        margin-bottom: 6px;
        font-family: "Syne", sans-serif;
      }

      .hero-title {
        font-family: "Syne", sans-serif;
        font-size: 42px;
        font-weight: 800;
        line-height: 1;
        margin-bottom: 10px;
        letter-spacing: -1px;
      }

      .hero-meta {
        display: flex;
        align-items: center;
        gap: 8px;
        color: var(--muted);
        font-size: 13px;
      }

      .hero-meta .dot {
        width: 3px;
        height: 3px;
        border-radius: 50%;
        background: var(--muted);
      }

      /* ── Actions bar ── */
      .actions-bar {
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 20px 20px 8px;
      }

      .play-btn {
        width: 56px;
        height: 56px;
        border-radius: 50%;
        background: var(--accent);
        border: none;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        box-shadow: 0 8px 24px var(--accent-glow);
        transition:
          transform var(--transition),
          box-shadow var(--transition);
        flex-shrink: 0;
      }

      .play-btn:hover {
        transform: scale(1.06);
        box-shadow: 0 12px 32px var(--accent-glow);
      }

      .play-btn:active {
        transform: scale(0.97);
      }
      .play-btn svg {
        width: 22px;
        height: 22px;
        color: #000;
        margin-left: 3px;
      }

      .shuffle-btn {
        width: 42px;
        height: 42px;
        border-radius: 50%;
        background: none;
        border: 1.5px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: all var(--transition);
        flex-shrink: 0;
      }

      .shuffle-btn:hover {
        border-color: var(--accent);
        background: var(--accent-dim);
      }
      .shuffle-btn svg {
        width: 18px;
        height: 18px;
        color: var(--muted);
      }
      .shuffle-btn:hover svg {
        color: var(--accent);
      }

      .sort-btn {
        margin-left: auto;
        background: none;
        border: none;
        color: var(--muted);
        font-family: "DM Sans", sans-serif;
        font-size: 13px;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 5px;
        padding: 6px 10px;
        border-radius: 8px;
        transition: all var(--transition);
      }
      .sort-btn:hover {
        color: var(--text);
        background: var(--surface2);
      }
      .sort-btn svg {
        width: 14px;
        height: 14px;
      }

      /* ── Filter tabs ── */
      .filter-tabs {
        display: flex;
        gap: 8px;
        padding: 8px 20px 16px;
        overflow-x: auto;
        scrollbar-width: none;
      }
      .filter-tabs::-webkit-scrollbar {
        display: none;
      }

      .tab {
        flex-shrink: 0;
        padding: 6px 16px;
        border-radius: 20px;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        border: 1.5px solid var(--border);
        background: none;
        color: var(--muted);
        font-family: "DM Sans", sans-serif;
        transition: all var(--transition);
      }

      .tab:hover {
        border-color: rgba(255, 255, 255, 0.2);
        color: var(--text);
      }

      .tab.active {
        background: var(--text);
        color: #000;
        border-color: transparent;
        font-weight: 600;
      }

      /* ── Track list ── */
      .track-list {
        padding: 0 0 160px;
      }

      /* Header colonnes */
      .list-header {
        display: grid;
        grid-template-columns: 36px 1fr 1fr 40px;
        gap: 12px;
        padding: 0 20px 8px;
        border-bottom: 1px solid var(--border);
        margin-bottom: 4px;
      }

      .list-header span {
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 1px;
        text-transform: uppercase;
        color: var(--muted2);
      }

      .list-header .col-num {
        text-align: center;
      }
      .list-header .col-dur {
        text-align: right;
      }

      /* Row */
      .track-row {
        display: grid;
        grid-template-columns: 36px 1fr 1fr 40px;
        gap: 12px;
        padding: 8px 20px;
        align-items: center;
        border-radius: 8px;
        margin: 0 8px;
        transition: background var(--transition);
        cursor: pointer;
        position: relative;
      }

      .track-row:hover {
        background: var(--surface2);
      }
      .track-row:hover .track-num {
        opacity: 0;
      }
      .track-row:hover .track-play-icon {
        opacity: 1;
      }

      .track-row.playing {
        background: var(--accent-dim);
      }

      .track-row.playing .track-title {
        color: var(--accent);
      }

      /* Numéro / icône play */
      .track-num-wrap {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 36px;
        height: 36px;
      }

      .track-num {
        font-size: 14px;
        color: var(--muted);
        font-variant-numeric: tabular-nums;
        transition: opacity var(--transition);
      }

      .track-play-icon {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        transition: opacity var(--transition);
      }

      .track-play-icon svg {
        width: 16px;
        height: 16px;
        color: var(--text);
      }

      /* Equalizer animé pour le morceau en cours */
      .equalizer {
        display: flex;
        align-items: flex-end;
        gap: 2px;
        height: 14px;
      }

      .eq-bar {
        width: 3px;
        background: var(--accent);
        border-radius: 2px;
        animation: eq 0.8s ease-in-out infinite alternate;
      }

      .eq-bar:nth-child(1) {
        height: 6px;
        animation-delay: 0s;
      }
      .eq-bar:nth-child(2) {
        height: 12px;
        animation-delay: 0.2s;
      }
      .eq-bar:nth-child(3) {
        height: 8px;
        animation-delay: 0.1s;
      }
      .eq-bar:nth-child(4) {
        height: 14px;
        animation-delay: 0.3s;
      }

      @keyframes eq {
        from {
          transform: scaleY(0.4);
        }
        to {
          transform: scaleY(1);
        }
      }

      /* Infos track */
      .track-info {
        display: flex;
        align-items: center;
        gap: 12px;
        min-width: 0;
      }

      .track-cover {
        width: 42px;
        height: 42px;
        border-radius: 6px;
        object-fit: cover;
        flex-shrink: 0;
        background: var(--surface2);
      }

      .track-text {
        min-width: 0;
      }

      .track-title {
        font-size: 14px;
        font-weight: 500;
        color: var(--text);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        line-height: 1.3;
        transition: color var(--transition);
      }

      .track-artist {
        font-size: 12px;
        color: var(--muted);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        margin-top: 2px;
      }

      /* Album */
      .track-album {
        font-size: 13px;
        color: var(--muted);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        display: none;
      }

      /* Actions + durée */
      .track-end {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 10px;
      }

      .heart-btn {
        background: none;
        border: none;
        cursor: pointer;
        padding: 4px;
        opacity: 0;
        transition:
          opacity var(--transition),
          transform var(--transition);
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .track-row:hover .heart-btn {
        opacity: 1;
      }
      .heart-btn.liked {
        opacity: 1;
      }
      .heart-btn svg {
        width: 16px;
        height: 16px;
      }
      .heart-btn.liked svg {
        color: var(--accent);
        fill: var(--accent);
      }
      .heart-btn:not(.liked) svg {
        color: var(--muted);
        fill: transparent;
        stroke: var(--muted);
      }
      .heart-btn:hover {
        transform: scale(1.2);
      }

      .track-duration {
        font-size: 13px;
        color: var(--muted);
        font-variant-numeric: tabular-nums;
        min-width: 32px;
        text-align: right;
      }

      /* ── Divider de section ── */
      .section-divider {
        padding: 20px 20px 8px;
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .section-divider span {
        font-family: "Syne", sans-serif;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: var(--muted2);
        white-space: nowrap;
      }

      .section-divider::after {
        content: "";
        flex: 1;
        height: 1px;
        background: var(--border);
      }

      /* ── Barre mini-player simulée ── */
      .mini-player {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: rgba(18, 18, 18, 0.95);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border-top: 1px solid var(--border);
        padding: 10px 16px 20px;
        z-index: 100;
      }

      .progress-bar-wrap {
        height: 2px;
        background: var(--muted2);
        border-radius: 2px;
        margin-bottom: 10px;
        position: relative;
        overflow: hidden;
      }

      .progress-bar-fill {
        height: 100%;
        width: 35%;
        background: var(--accent);
        border-radius: 2px;
      }

      .mini-track {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .mini-cover {
        width: 40px;
        height: 40px;
        border-radius: 6px;
        background: linear-gradient(135deg, #6a11cb, #2575fc);
        flex-shrink: 0;
      }

      .mini-info {
        flex: 1;
        min-width: 0;
      }
      .mini-title {
        font-size: 13px;
        font-weight: 500;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .mini-artist {
        font-size: 12px;
        color: var(--muted);
      }

      .mini-controls {
        display: flex;
        align-items: center;
        gap: 16px;
      }

      .mini-btn {
        background: none;
        border: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 4px;
      }

      .mini-btn svg {
        width: 20px;
        height: 20px;
        color: var(--text);
      }
      .mini-btn.play svg {
        width: 32px;
        height: 32px;
      }

      /* Animations d'entrée */
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(16px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .track-row {
        animation: fadeUp 0.3s ease both;
      }

      .track-row:nth-child(1) {
        animation-delay: 0.05s;
      }
      .track-row:nth-child(2) {
        animation-delay: 0.08s;
      }
      .track-row:nth-child(3) {
        animation-delay: 0.11s;
      }
      .track-row:nth-child(4) {
        animation-delay: 0.14s;
      }
      .track-row:nth-child(5) {
        animation-delay: 0.17s;
      }
      .track-row:nth-child(6) {
        animation-delay: 0.2s;
      }
      .track-row:nth-child(7) {
        animation-delay: 0.23s;
      }
      .track-row:nth-child(8) {
        animation-delay: 0.26s;
      }

      @media (min-width: 500px) {
        .track-row {
          grid-template-columns: 36px 1fr 1fr 40px;
        }
        .track-album {
          display: block;
        }
      }
    </style>
  </head>
  <body>
    <!-- Hero -->
    <div class="hero">
      <div class="hero-bg"></div>
      <div class="hero-pattern"></div>
      <div class="hero-content">
        <button class="back-btn">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M19 12H5M12 5l-7 7 7 7" />
          </svg>
          Bibliothèque
        </button>

        <div class="hero-icon">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path
              d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"
            />
          </svg>
        </div>

        <p class="hero-label">Playlist</p>
        <h1 class="hero-title">Liked Songs</h1>
        <div class="hero-meta">
          <span>Spotywoop</span>
          <span class="dot"></span>
          <span>247 titres</span>
        </div>
      </div>
    </div>

    <!-- Actions -->
    <div class="actions-bar">
      <button class="play-btn" id="playBtn">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M8 5v14l11-7z" />
        </svg>
      </button>

      <button class="shuffle-btn" id="shuffleBtn">
        <svg
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <polyline points="16 3 21 3 21 8" />
          <line x1="4" y1="20" x2="21" y2="3" />
          <polyline points="21 16 21 21 16 21" />
          <line x1="4" y1="4" x2="9" y2="9" />
        </svg>
      </button>

      <button class="sort-btn">
        <svg
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <line x1="8" y1="6" x2="21" y2="6" />
          <line x1="8" y1="12" x2="21" y2="12" />
          <line x1="8" y1="18" x2="21" y2="18" />
          <line x1="3" y1="6" x2="3.01" y2="6" />
          <line x1="3" y1="12" x2="3.01" y2="12" />
          <line x1="3" y1="18" x2="3.01" y2="18" />
        </svg>
        Trier
      </button>
    </div>

    <!-- Filtres -->
    <div class="filter-tabs">
      <button class="tab active">Tout</button>
      <button class="tab">Musique</button>
      <button class="tab">Récents</button>
      <button class="tab">Artistes</button>
      <button class="tab">Albums</button>
    </div>

    <!-- Liste -->
    <div class="track-list">
      <div class="list-header">
        <span class="col-num">#</span>
        <span>Titre</span>
        <span>Album</span>
        <span class="col-dur">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            style="width: 14px; height: 14px"
          >
            <circle cx="12" cy="12" r="10" />
            <polyline points="12 6 12 12 16 14" />
          </svg>
        </span>
      </div>

      <!-- Tracks (le morceau en cours = index 0) -->
      <div id="trackList"></div>
    </div>

    <!-- Mini player -->
    <div class="mini-player">
      <div class="progress-bar-wrap">
        <div class="progress-bar-fill" id="progressFill"></div>
      </div>
      <div class="mini-track">
        <div
          class="mini-cover"
          id="miniCover"
          style="background: linear-gradient(135deg, #6a11cb, #2575fc)"
        ></div>
        <div class="mini-info">
          <div class="mini-title" id="miniTitle">DNA.</div>
          <div class="mini-artist" id="miniArtist">Kendrick Lamar</div>
        </div>
        <div class="mini-controls">
          <!-- Précédent -->
          <button class="mini-btn">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M6 6h2v12H6zm3.5 6 8.5 6V6z" />
            </svg>
          </button>
          <!-- Play/Pause -->
          <button class="mini-btn play" id="miniPlayBtn">
            <svg viewBox="0 0 24 24" fill="currentColor" id="miniPlayIcon">
              <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" />
            </svg>
          </button>
          <!-- Suivant -->
          <button class="mini-btn">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z" />
            </svg>
          </button>
          <!-- Cœur -->
          <button class="mini-btn">
            <svg viewBox="0 0 24 24" fill="currentColor" style="color: #1db954">
              <path
                d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"
              />
            </svg>
          </button>
        </div>
      </div>
    </div>

    <script>
      const tracks = [
        {
          id: 1,
          title: "DNA.",
          artist: "Kendrick Lamar",
          album: "DAMN.",
          duration: "3:05",
          liked: true,
          playing: true,
          color: "#e63946",
        },
        {
          id: 2,
          title: "God's Plan",
          artist: "Drake",
          album: "Scorpion",
          duration: "3:18",
          liked: true,
          color: "#457b9d",
        },
        {
          id: 3,
          title: "HUMBLE.",
          artist: "Kendrick Lamar",
          album: "DAMN.",
          duration: "2:57",
          liked: true,
          color: "#e9c46a",
        },
        {
          id: 4,
          title: "Blinding Lights",
          artist: "The Weeknd",
          album: "After Hours",
          duration: "3:20",
          liked: true,
          color: "#f4a261",
        },
        {
          id: 5,
          title: "Savage",
          artist: "Megan Thee Stallion",
          album: "Suga",
          duration: "2:22",
          liked: false,
          color: "#2a9d8f",
        },
        {
          id: 6,
          title: "Montero",
          artist: "Lil Nas X",
          album: "MONTERO",
          duration: "2:17",
          liked: true,
          color: "#e76f51",
        },
        {
          id: 7,
          title: "Essence",
          artist: "Wizkid ft. Tems",
          album: "Made in Lagos",
          duration: "3:40",
          liked: true,
          color: "#264653",
        },
        {
          id: 8,
          title: "Mood",
          artist: "24kGoldn ft. Iann Dior",
          album: "El Dorado",
          duration: "2:21",
          liked: false,
          color: "#6d6875",
        },
      ];

      let currentTrack = 0;
      let isPlaying = false;

      function formatDuration(d) {
        return d;
      }

      function renderTracks() {
        const container = document.getElementById("trackList");
        container.innerHTML = "";

        tracks.forEach((t, i) => {
          const row = document.createElement("div");
          row.className = "track-row" + (i === currentTrack ? " playing" : "");
          row.dataset.index = i;

          const isPlaying = i === currentTrack && window.isPlaying;

          row.innerHTML = `
      <div class="track-num-wrap">
        ${
          i === currentTrack && window.isPlaying
            ? `<div class="equalizer"><div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div></div>`
            : `<span class="track-num">${i + 1}</span>
             <div class="track-play-icon">
               <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
             </div>`
        }
      </div>
      <div class="track-info">
        <div class="track-cover" style="background: linear-gradient(135deg, ${t.color}88, ${t.color}44);"></div>
        <div class="track-text">
          <div class="track-title">${t.title}</div>
          <div class="track-artist">${t.artist}</div>
        </div>
      </div>
      <div class="track-album">${t.album}</div>
      <div class="track-end">
        <button class="heart-btn ${t.liked ? "liked" : ""}" data-index="${i}">
          <svg viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12z"
              ${t.liked ? 'fill="currentColor"' : 'fill="none"'}
            />
          </svg>
        </button>
        <span class="track-duration">${t.duration}</span>
      </div>
    `;

          row.addEventListener("click", (e) => {
            if (e.target.closest(".heart-btn")) return;
            currentTrack = i;
            window.isPlaying = true;
            updateMiniPlayer();
            renderTracks();
          });

          container.appendChild(row);
        });

        // Heart buttons
        document.querySelectorAll(".heart-btn").forEach((btn) => {
          btn.addEventListener("click", (e) => {
            e.stopPropagation();
            const idx = parseInt(btn.dataset.index);
            tracks[idx].liked = !tracks[idx].liked;
            renderTracks();
          });
        });
      }

      function updateMiniPlayer() {
        const t = tracks[currentTrack];
        document.getElementById("miniTitle").textContent = t.title;
        document.getElementById("miniArtist").textContent = t.artist;
        document.getElementById("miniCover").style.background =
          `linear-gradient(135deg, ${t.color}, ${t.color}66)`;

        const icon = document.getElementById("miniPlayIcon");
        if (window.isPlaying) {
          icon.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
        } else {
          icon.innerHTML = '<path d="M8 5v14l11-7z"/>';
        }
      }

      // Play/pause mini
      document.getElementById("miniPlayBtn").addEventListener("click", () => {
        window.isPlaying = !window.isPlaying;
        updateMiniPlayer();
        renderTracks();
      });

      // Play btn hero
      document.getElementById("playBtn").addEventListener("click", () => {
        currentTrack = 0;
        window.isPlaying = true;
        updateMiniPlayer();
        renderTracks();
      });

      // Shuffle btn
      document
        .getElementById("shuffleBtn")
        .addEventListener("click", function () {
          this.style.borderColor =
            this.style.borderColor === "rgb(29, 185, 84)" ? "" : "#1DB954";
          const svg = this.querySelector("svg");
          svg.style.color =
            svg.style.color === "rgb(29, 185, 84)" ? "" : "#1DB954";
        });

      // Filter tabs
      document.querySelectorAll(".tab").forEach((tab) => {
        tab.addEventListener("click", () => {
          document
            .querySelectorAll(".tab")
            .forEach((t) => t.classList.remove("active"));
          tab.classList.add("active");
        });
      });

      // Barre de progression simulée
      let progress = 35;
      let progressInterval = null;

      function startProgress() {
        if (progressInterval) return;
        progressInterval = setInterval(() => {
          progress = (progress + 0.05) % 100;
          document.getElementById("progressFill").style.width = progress + "%";
        }, 100);
      }

      function stopProgress() {
        clearInterval(progressInterval);
        progressInterval = null;
      }

      document.getElementById("miniPlayBtn").addEventListener("click", () => {
        if (window.isPlaying) startProgress();
        else stopProgress();
      });

      // Init
      window.isPlaying = true;
      renderTracks();
      updateMiniPlayer();
      startProgress();
    </script>
  </body>
</html>
